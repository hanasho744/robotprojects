<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>意思決定者向け｜深セン視察プログラム — ケーススタディ</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen">
    <div class="max-w-4xl mx-auto p-8">
      <a href="/index.html" class="text-cyan-400 mb-6 inline-block">← ホームへ戻る</a>
      <h1 class="text-3xl font-bold mb-4">意思決定者向け｜深セン視察プログラム</h1>
      <p class="text-slate-400 mb-6">公開範囲：事前合意の上で企業名を掲載可能</p>

      <h2 class="text-xl font-semibold mt-6">訪前ブリーフ</h2>
      <p class="text-slate-300">目的整理、優先視察先の選定、事前資料の準備を行います。</p>

      <h2 class="text-xl font-semibold mt-6">当日の主な流れ</h2>
      <ul class="list-disc ml-6 text-slate-300">
        <li>企業訪問・経営層との面談</li>
        <li>工場視察・品質確認</li>
        <li>現地での評価ミーティング</li>
      </ul>

      <h2 class="text-xl font-semibold mt-6">納品物</h2>
      <ul class="list-disc ml-6 text-slate-300">
        <li>訪察行程表（英日）</li>
        <li>当日メモ・現地評価レポート</li>
      </ul>

      <h2 class="text-xl font-semibold mt-6">結果</h2>
      <p class="text-slate-300">視察後に複数のPoC候補が選定され、次の交渉フェーズへ移行。</p>
    </div>
  </body>
</html>
