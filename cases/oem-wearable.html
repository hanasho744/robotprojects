<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIウェアラブル｜工場選定～量産管理 — ケーススタディ</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen">
    <div class="max-w-4xl mx-auto p-8">
      <a href="/index.html" class="text-cyan-400 mb-6 inline-block">← ホームへ戻る</a>
      <h1 class="text-3xl font-bold mb-4">AIウェアラブル｜工場選定～量産管理</h1>
      <p class="text-slate-400 mb-6">公開範囲：匿名公開（量産管理・品質向上に関するデータを一部開示）</p>

      <h2 class="text-xl font-semibold mt-6">背景</h2>
      <p class="text-slate-300">ウェアラブル製品の量産に移行する際、不良率の低減とコスト管理が急務だった。</p>

      <h2 class="text-xl font-semibold mt-6">課題</h2>
      <ul class="list-disc ml-6 text-slate-300">
        <li>候補工場の品質差が大きい</li>
        <li>試作から量産へスムーズに移行できない</li>
      </ul>

      <h2 class="text-xl font-semibold mt-6">支援内容</h2>
      <p class="text-slate-300">工場監査、試作管理、QCチェックリストの整備、量産立ち上げのPMOを担当。</p>

      <h2 class="text-xl font-semibold mt-6">納品物</h2>
      <ul class="list-disc ml-6 text-slate-300">
        <li>工場比較表</li>
        <li>試作評価レポート</li>
        <li>量産QA/QC計画</li>
      </ul>

      <h2 class="text-xl font-semibold mt-6">結果</h2>
      <p class="text-slate-300">試作工程の改善により、量産初期の不良率が低減し、量産立ち上げが予定通りに完了。</p>
    </div>
  </body>
</html>
