<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>新規事業向け｜キーマン面談設定 — ケーススタディ</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen">
    <div class="max-w-4xl mx-auto p-8">
      <a href="/index.html" class="text-cyan-400 mb-6 inline-block">← ホームへ戻る</a>
      <h1 class="text-3xl font-bold mb-4">新規事業向け｜キーマン面談設定</h1>
      <p class="text-slate-400 mb-6">公開範囲：匿名（ネットワーク活用の事例紹介）</p>

      <h2 class="text-xl font-semibold mt-6">背景</h2>
      <p class="text-slate-300">中国企業の経営層へアクセスする必要があったが、適切な接点を持たないため進捗が停滞。</p>

      <h2 class="text-xl font-semibold mt-6">課題</h2>
      <ul class="list-disc ml-6 text-slate-300">
        <li>決裁層との接触経路が不足</li>
        <li>日中での交渉言語サポートが必要</li>
      </ul>

      <h2 class="text-xl font-semibold mt-6">支援内容</h2>
      <p class="text-slate-300">対象選定・アポ取り・面談時の通訳・会後の条件整理を一括で実施。</p>

      <h2 class="text-xl font-semibold mt-6">納品物</h2>
      <ul class="list-disc ml-6 text-slate-300">
        <li>面談候補Shortlist</li>
        <li>双語議事録</li>
        <li>交渉メモと次ステップ提案</li>
      </ul>

      <h2 class="text-xl font-semibold mt-6">結果</h2>
      <p class="text-slate-300">複数の決裁層面談を短期間で実現、候補先とのPoC協議へ進展。</p>
    </div>
  </body>
</html>
